name: Sync Stable Paperclip Release

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

concurrency:
  group: paperclip-release-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout deployment branch
        uses: actions/checkout@v4
        with:
          ref: codex/fix-embedded-postgres-dsm-mmap-upstream
          fetch-depth: 0

      - name: Merge latest official stable release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "paperclip-release-sync[bot]"
          git config user.email "paperclip-release-sync[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/paperclipai/paperclip.git
          git fetch --tags upstream
          latest_tag="$(gh api repos/paperclipai/paperclip/releases/latest --jq .tag_name)"
          if git merge-base --is-ancestor "$latest_tag" HEAD; then
            echo "Deployment branch already contains ${latest_tag}."
            exit 0
          fi
          git merge --no-edit --no-ff "$latest_tag"
          git push origin HEAD:refs/heads/codex/fix-embedded-postgres-dsm-mmap-upstream
